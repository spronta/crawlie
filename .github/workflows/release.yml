name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── npm: the CLI + MCP ship only through npm (no loose binaries to download) ──

  # Build each platform's binaries and publish them as a platform package
  # (@spronta/crawlie-<platform>). npm installs only the one matching os/cpu.
  npm-platforms:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin, asset: darwin-arm64, npmos: darwin, npmcpu: arm64, ext: "" }
          - { os: macos-latest, target: x86_64-apple-darwin, asset: darwin-x64, npmos: darwin, npmcpu: x64, ext: "" }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, asset: linux-x64, npmos: linux, npmcpu: x64, ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, asset: win32-x64, npmos: win32, npmcpu: x64, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Build CLI + MCP
        run: cargo build --release --target ${{ matrix.target }} -p crawlie-cli -p crawlie-mcp
      - name: Assemble + publish platform package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          V="${VERSION#v}"
          mkdir -p pkg
          cp "target/${{ matrix.target }}/release/crawlie${{ matrix.ext }}" pkg/
          cp "target/${{ matrix.target }}/release/crawlie-mcp${{ matrix.ext }}" pkg/
          if [ -z "${{ matrix.ext }}" ]; then chmod +x pkg/crawlie pkg/crawlie-mcp; fi
          VERSION="$V" node -e '
            const fs = require("fs");
            fs.writeFileSync("pkg/package.json", JSON.stringify({
              name: "@spronta/crawlie-${{ matrix.asset }}",
              version: process.env.VERSION,
              description: "crawlie prebuilt binaries (${{ matrix.asset }}).",
              license: "MIT",
              homepage: "https://github.com/spronta/crawlie",
              repository: { type: "git", url: "git+https://github.com/spronta/crawlie.git" },
              os: ["${{ matrix.npmos }}"],
              cpu: ["${{ matrix.npmcpu }}"],
              files: ["crawlie${{ matrix.ext }}", "crawlie-mcp${{ matrix.ext }}"]
            }, null, 2) + "\n");
          '
          cd pkg && npm publish --access public

  # Publish the main wrapper once every platform package is live.
  npm-main:
    needs: npm-platforms
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Set version + pin platform deps to this release
        working-directory: npm
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          V="${VERSION#v}"
          VERSION="$V" node -e '
            const fs = require("fs"); const v = process.env.VERSION;
            const p = JSON.parse(fs.readFileSync("package.json"));
            p.version = v;
            for (const k of Object.keys(p.optionalDependencies || {})) p.optionalDependencies[k] = v;
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
      - name: Publish crawlie
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release: the desktop app is the only installer to download ──

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "crawlie ${GITHUB_REF_NAME}" \
            --notes "**CLI + MCP:** \`npm i -g crawlie\`. **Desktop app:** download the signed .dmg below." \
            --draft

  # Signed + notarized universal macOS desktop app.
  desktop:
    needs: create-release
    runs-on: macos-latest
    # Notarization normally finishes in minutes; cap it so a stalled Apple notary
    # service fails fast instead of burning ~6h of (10x-priced) macOS runner time.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - name: Build signed desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing — set these repo secrets from `pnpm tauri signer generate`.
          # The matching public key must be in apps/desktop/src-tauri/tauri.conf.json
          # (plugins.updater.pubkey). With these present, tauri-action emits the
          # signed update bundle (.app.tar.gz + .sig) and a latest.json manifest.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Build only — produces the signed .dmg and the signed updater bundle
          # (.app.tar.gz + .sig). The next step publishes them and writes
          # latest.json; tauri-action's own publish can't target the draft
          # release the create-release job makes.
          projectPath: apps/desktop
          args: --target universal-apple-darwin
      - name: Upload installer + publish release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base=apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          ver="${GITHUB_REF_NAME#v}"
          tarball="$base/macos/crawlie.app.tar.gz"
          sig=$(cat "$tarball.sig")
          url="https://github.com/spronta/crawlie/releases/download/${GITHUB_REF_NAME}/crawlie.app.tar.gz"
          # latest.json is what the in-app updater fetches (endpoint:
          # releases/latest/download/latest.json). Universal build → both arches
          # point at the same signed tarball. Built with jq to avoid quoting bugs.
          jq -n --arg ver "$ver" --arg sig "$sig" --arg url "$url" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version:$ver, pub_date:$date, platforms:{"darwin-aarch64":{signature:$sig,url:$url},"darwin-x86_64":{signature:$sig,url:$url}}}' \
            > latest.json
          gh release upload "${GITHUB_REF_NAME}" "$base"/dmg/*.dmg "$tarball" latest.json --clobber
          gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
