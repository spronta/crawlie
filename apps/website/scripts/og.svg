<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Geist, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <radialGradient id="glow" cx="28%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#3b9eff"/>
      <stop offset="100%" stop-color="#3ddc91"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080a0f"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#1b212c"/>

  <!-- brand mark -->
  <g transform="translate(80, 76)">
    <g stroke="#3b9eff" stroke-width="3.2" stroke-linecap="round" fill="none">
      <path d="M24 24 L9 9"/>
      <path d="M24 24 L40 11"/>
      <path d="M24 24 L11 40"/>
      <path d="M24 24 L40 39"/>
    </g>
    <circle cx="24" cy="24" r="5.6" fill="#3b9eff"/>
    <circle cx="9" cy="9" r="3.8" fill="#3ddc91"/>
    <circle cx="40" cy="11" r="3.8" fill="#f5b544"/>
    <circle cx="11" cy="40" r="3.8" fill="#f5f7fb"/>
    <circle cx="40" cy="39" r="3.8" fill="#ff6166"/>
    <text x="66" y="36" fill="#f5f7fb" font-size="34" font-weight="600" letter-spacing="-0.5">crawlie</text>
  </g>

  <!-- badge -->
  <g transform="translate(80, 200)">
    <rect width="430" height="44" rx="22" fill="#101319" stroke="#273040"/>
    <circle cx="26" cy="22" r="5" fill="#3ddc91"/>
    <text x="44" y="29" fill="#9aa3b2" font-size="17" font-family="Geist Mono, ui-monospace, monospace">#4 on Hacker News · most-upvoted OSS SEO crawler</text>
  </g>

  <!-- headline -->
  <text x="78" y="330" fill="#f5f7fb" font-size="74" font-weight="600" letter-spacing="-2.5">Technical SEO that</text>
  <text x="78" y="412" font-size="74" font-weight="600" letter-spacing="-2.5" fill="url(#grad)">works with your agents.</text>

  <!-- subhead -->
  <text x="80" y="476" fill="#9aa3b2" font-size="26">Free, open-source crawler for SEO + AI-search readiness.</text>
  <text x="80" y="512" fill="#9aa3b2" font-size="26">46 checks · plain-English fixes · a CLI and an MCP server.</text>

  <!-- install command -->
  <g transform="translate(80, 540)">
    <rect width="470" height="50" rx="9" fill="#0b0e14" stroke="#273040"/>
    <text x="22" y="32" font-size="20" font-family="Geist Mono, ui-monospace, monospace"><tspan fill="#3ddc91">$ </tspan><tspan fill="#f5f7fb">npm i -g @spronta/crawlie</tspan></text>
  </g>

  <!-- domain -->
  <text x="1120" y="572" text-anchor="end" fill="#6b7382" font-size="22" font-family="Geist Mono, ui-monospace, monospace">crawlie.dev</text>
</svg>
